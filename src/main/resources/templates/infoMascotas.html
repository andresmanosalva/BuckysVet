<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Mascotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1 class="titulo mb-4" >Lista de Mascotas</h1>
    <table class="table table-striped table-hover">
        <thead class = "table-dark">
            <tr>
                <th>Nombre</th>
                <th>Especie</th>
                <th>Edad</th>
                <th>Peso</th>
                <th>Enfermedad</th>
                <th>Imagen</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="mascota : ${mascotas}">
                <td><a th:href="@{/infoMascota/{nombre}(nombre=${mascota.nombre})}" th:text="${mascota.nombre}"></a></td>
                <td th:text="${mascota.especie}"></td>
                <td th:text="${mascota.edad}"></td>
                <td th:text="${mascota.peso}"></td>
                <td th:text="${mascota.enfermedad}"></td>
                <td><img th:src="${mascota.imagenUrl}" alt="Imagen de la mascota" width="100"/></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
